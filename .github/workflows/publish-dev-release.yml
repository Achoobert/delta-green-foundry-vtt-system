on:
  push:
    branches:
      - master
      - hotfix/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------
      # 1. Checkout SOURCE code
      # -------------------------------
      - name: Checkout source repo
        uses: actions/checkout@v4

      # -------------------------------
      # 2. Create useful variables/output.
      # -------------------------------
      - name: Compute branch folder
        id: vars
        shell: bash
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"

          if [[ "$BRANCH" == "master" ]]; then
            TARGET="dev"
            NON_TARGET="hotfix"
          else
            TARGET="hotfix"
            NON_TARGET="dev"
          fi

          echo "target=$TARGET" >> $GITHUB_OUTPUT
          echo "non_target=$NON_TARGET" >> $GITHUB_OUTPUT

      - name: Set version
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # -------------------------------
      # 3. Build and Zip the system
      # -------------------------------
      - name: Build Packs
        uses: ./.github/actions/build-packs

      - name: Substitute Download Link
        uses: TomaszKandula/variable-substitution@v1.0.1
        with:
          files: system.json
        env:
          version: ${{ steps.vars.outputs.target }}+${{ env.SHORT_SHA }}
          download: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ steps.vars.outputs.target }}/deltagreen.zip

      - name: Zip
        uses: ./.github/actions/zip-system

      # -------------------------------
      # 4. Deploy to Github Pages
      # -------------------------------
      - name: Restore other channel from cache
        uses: actions/cache/restore@v4
        with:
          path: site/${{ steps.vars.outputs.non_target }}
          key: pages-channel-${{ steps.vars.outputs.non_target }}-${{ github.repository }}
          restore-keys: |
            pages-channel-${{ steps.vars.outputs.non_target }}-${{ github.repository }}

      - name: Create Site Structure
        shell: bash
        env:
          NON_TARGET: ${{ steps.vars.outputs.non_target }}
          TARGET: ${{ steps.vars.outputs.target }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          mkdir -p site/dev site/hotfix

          preserve_channel() {
            local base="$1"
            local dest="site/${NON_TARGET}"
            curl -fsSL -o "${dest}/deltagreen.zip" "${base}/${NON_TARGET}/deltagreen.zip" &&
              curl -fsSL -o "${dest}/system.json" "${base}/${NON_TARGET}/system.json"
          }

          PAGES_BASES=(
            "https://${REPO_OWNER}.github.io/${REPO_NAME}"
          )
          if [[ "${REPO_OWNER}" != "deltagreen-foundryvtt" ]]; then
            PAGES_BASES+=("https://deltagreen-foundryvtt.github.io/${REPO_NAME}")
          fi

          preserved=false
          for base in "${PAGES_BASES[@]}"; do
            if preserve_channel "${base}"; then
              echo "Preserved ${NON_TARGET} channel from ${base}"
              preserved=true
              break
            fi
          done

          if [[ "${preserved}" != true ]]; then
            if [[ -f "site/${NON_TARGET}/deltagreen.zip" && -f "site/${NON_TARGET}/system.json" ]]; then
              echo "Using cached ${NON_TARGET} channel (Pages download unavailable)."
            else
              echo "::warning::Could not preserve ${NON_TARGET} channel (first deploy, cache miss, or Pages URL unavailable). Deploying ${TARGET} only until the other branch publishes."
            fi
          fi

          cp system.json deltagreen.zip "site/${TARGET}/"

      - name: Cache dev channel
        if: success() && hashFiles('site/dev/deltagreen.zip') != ''
        uses: actions/cache/save@v4
        with:
          path: site/dev
          key: pages-channel-dev-${{ github.repository }}

      - name: Cache hotfix channel
        if: success() && hashFiles('site/hotfix/deltagreen.zip') != ''
        uses: actions/cache/save@v4
        with:
          path: site/hotfix
          key: pages-channel-hotfix-${{ github.repository }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy
        uses: actions/deploy-pages@v4
